name: 每日台股資料更新

on:
  schedule:
    # P1-2 時段重分配（總數不增，分鐘避開整點——GitHub 整點排程常延遲 5-30 分）。
    # 事件驅動為主：n8n Phase1（籌碼就緒 ~16:00）與 Phase2（融資就緒 ~19:00+）都會 dispatch，
    # 以下 cron 是保險班次。
    # 台北 15:37 → FMTQIK 15:30 就緒，第一時間更新大盤 K 線
    - cron: '37 7 * * 1-5'
    # 台北 16:07 → T86 約 16:00 起可用，泡泡圖首班
    - cron: '7 8 * * 1-5'
    # 台北 17:07 → T86/股價補跑
    - cron: '7 9 * * 1-5'
    # 台北 18:37 → 融資（MI_MARGN）常在 17:00-19:00 發布
    - cron: '37 10 * * 1-5'
    # 台北 20:07 → 補跑 STOCK_DAY_ALL 較晚更新
    - cron: '7 12 * * 1-5'
    # 台北 22:07
    - cron: '7 14 * * 1-5'
    # 台北 23:37 → 補捉 STOCK_DAY_ALL 深夜更新（過午夜 Guard 2 就封死了）
    - cron: '37 15 * * 1-5'
    # P2-3：台北 06:07 → 全球指數輕量班次（獨立 job，不跑主 pipeline）。
    # 台北 06:07 = UTC 前一天 22:07，故 UTC 星期用 0-4（週日~週四）才對應台北週一~週五早上
    - cron: '7 22 * * 0-4'
    # 不受開盤限制的補課班次：STOCK_DAY_ALL／融資常常深夜才發布，原本最晚 23:37
    # 那班之後到隔天 15:37 之間完全沒有機會追。這兩班天天跑（含假日，成本可忽略——
    # public repo 無 Actions 分鐘限制），略過 FMTQIK Guard，只為了盡快撿到遲到的資料。
    # 台北 02:07 = UTC 前一天 18:07
    - cron: '7 18 * * *'
    # 台北 08:07 = UTC 00:07
    - cron: '7 0 * * *'
  workflow_dispatch: # n8n Phase1/Phase2 完成後觸發，或手動補跑
    inputs:
      force_run:
        description: '略過 FMTQIK Guard，強制跑完整 pipeline（本機不要再直接跑 fetch-daily.mjs/write-firebase.mjs 寫 production——iCloud 會干擾 data/latest.json，2026-07-10 已經證實會悄悄還原成舊內容，一律用這個 workflow_dispatch 補跑）'
        type: boolean
        default: false
      fetch_global:
        description: 'R7：單獨補跑全球指數（原本只有台北 06:07 那班會跑，失敗要等 24 小時；建議挑各市場都收盤的時段觸發，見 R11）'
        type: boolean
        default: false

# 固定 group 名稱讓所有 run 排同一隊：後到的排隊等前面跑完（不取消），
# 避免兩個 run 同時「下載快照→改→上傳」互相覆蓋（lost update）
concurrency:
  group: daily-fetch
  cancel-in-progress: false

jobs:
  fetch-and-upload:
    # 06:07 全球指數班次不跑這個 job（交給下面的 fetch-global-indices）
    if: github.event_name != 'schedule' || github.event.schedule != '7 22 * * 0-4'
    runs-on: ubuntu-latest
    timeout-minutes: 60
    env:
      # 02:07／08:07 這兩班不受開盤限制，略過 FMTQIK Guard（Guard 2）——今日資料已完整時
      # 仍會被 Guard 1 攔下，R4 的 FORCE_FULL_RUN 才是穿透 Guard 1 的開關
      FORCE_SKIP_GUARD2: ${{ (github.event.schedule == '7 18 * * *' || github.event.schedule == '7 0 * * *') && 'true' || '' }}
      # R4：/review 的「強制執行」按鈕與手動 dispatch 勾選 force_run 專用，連 Guard 1（今日已完成）
      # 都要跳過，否則資料已完整時按鈕會靜默無效
      FORCE_FULL_RUN: ${{ github.event.inputs.force_run == 'true' && 'true' || '' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: package-lock.json

      # 假日判斷（TWSE 官方休市日曆，不受任何 Guard 限制，永遠執行）：
      # 供前端判斷「今天沒資料是因為休市」還是「還沒到更新時間」
      - name: 檢查台股是否為休市日
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: node scripts/check-holiday.mjs

      # 輕量 Guard 前置（零依賴、讀 ~1KB meta.json）：
      # 被攔截的 run 在這裡結束（~30 秒），不裝依賴、不下載 10MB 快照
      - name: Guard 前置檢查
        id: guard
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
        run: node scripts/guard-check.mjs

      - name: Install dependencies
        if: steps.guard.outputs.SHOULD_RUN == 'true'
        run: npm ci

      - name: Install firebase-admin
        if: steps.guard.outputs.SHOULD_RUN == 'true'
        run: npm install firebase-admin --no-save

      - name: 抓取每日行情（含兩道 Guard：已完成 / 非交易日）
        if: steps.guard.outputs.SHOULD_RUN == 'true'
        id: fetch
        env:
          FINMIND_TOKEN: ${{ secrets.FINMIND_TOKEN }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
        run: |
          node scripts/fetch-daily.mjs
          # 確認 latest.json stocks 非空 → 代表本次 run 實際跑了完整 pipeline
          if node -e "
            const d = JSON.parse(require('fs').readFileSync('data/latest.json','utf-8'));
            process.exit(d.stocks && d.stocks.length > 0 ? 0 : 99);
          " 2>/dev/null; then
            echo "PIPELINE_RAN=true" >> $GITHUB_OUTPUT
            echo "✅ Pipeline 執行完成"
          else
            echo "PIPELINE_RAN=false" >> $GITHUB_OUTPUT
            echo "⏭️ 本次 run 被 Guard 攔截，跳過（正常行為）"
          fi

      - name: 計算市場訊號
        if: steps.fetch.outputs.PIPELINE_RAN == 'true'
        run: node scripts/calc-signals.mjs 100

      - name: 上傳 Supabase + Firestore
        if: steps.fetch.outputs.PIPELINE_RAN == 'true'
        env:
          FIREBASE_SERVICE_ACCOUNT_JSON: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_JSON }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: node scripts/write-firebase.mjs

  # P2-3：全球指數，只在台北 06:07 這班跑。不裝依賴（腳本零依賴、只用內建 fetch），
  # 不動 latest.json/主 pipeline，AC(d) 要求 <1 分鐘結束
  fetch-global-indices:
    if: (github.event_name == 'schedule' && github.event.schedule == '7 22 * * 0-4') || github.event.inputs.fetch_global == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: 抓取全球指數（Yahoo Finance chart API）
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: node scripts/fetch-global.mjs
