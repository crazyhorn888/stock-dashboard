name: 每日台股資料更新

on:
  schedule:
    # 台北時間 15:30 → 股價資料通常可取，但融資可能還沒發布 → Guard 3 會擋下，等下次 retry
    - cron: '30 7 * * 1-5'
    # 台北時間 16:00
    - cron: '0 8 * * 1-5'
    # 台北時間 16:30 → 融資資料多數時候在此前後發布
    - cron: '30 8 * * 1-5'
    # 台北時間 17:00
    - cron: '0 9 * * 1-5'
    # 台北時間 17:30
    - cron: '30 9 * * 1-5'
    # 台北時間 18:30
    - cron: '30 10 * * 1-5'
    # 台北時間 19:00
    - cron: '0 11 * * 1-5'
    # 台北時間 20:00 → 補跑 STOCK_DAY_ALL 極晚更新（Guard 1 檢查 stocksDate，若股價仍舊日期則繼續更新）
    - cron: '0 12 * * 1-5'
    # 台北時間 21:00
    - cron: '0 13 * * 1-5'
    # 台北時間 22:00 → 最後一班
    - cron: '0 14 * * 1-5'
  workflow_dispatch: # 允許手動觸發（測試用）

# 同一天若有多個 run 同時跑（例如 Actions queue 延遲），後進的直接取消
concurrency:
  group: daily-fetch-${{ github.run_id }}
  cancel-in-progress: false

jobs:
  fetch-and-upload:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Install firebase-admin
        run: npm install firebase-admin --no-save

      - name: 抓取每日行情（含三道 Guard：已完成 / 非交易日 / 融資未就緒）
        id: fetch
        env:
          FINMIND_TOKEN: ${{ secrets.FINMIND_TOKEN }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
        run: |
          node scripts/fetch-daily.mjs
          # 確認 latest.json stocks 非空 → 代表本次 run 實際跑了完整 pipeline
          if node -e "
            const d = JSON.parse(require('fs').readFileSync('data/latest.json','utf-8'));
            process.exit(d.stocks && d.stocks.length > 0 ? 0 : 99);
          " 2>/dev/null; then
            echo "PIPELINE_RAN=true" >> $GITHUB_OUTPUT
            echo "✅ Pipeline 執行完成"
          else
            echo "PIPELINE_RAN=false" >> $GITHUB_OUTPUT
            echo "⏭️ 本次 run 被 Guard 攔截，跳過（正常行為）"
          fi

      - name: 計算市場訊號
        if: steps.fetch.outputs.PIPELINE_RAN == 'true'
        run: node scripts/calc-signals.mjs 100

      - name: 上傳 Supabase + Firestore
        if: steps.fetch.outputs.PIPELINE_RAN == 'true'
        env:
          FIREBASE_SERVICE_ACCOUNT_JSON: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_JSON }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: node scripts/write-firebase.mjs
