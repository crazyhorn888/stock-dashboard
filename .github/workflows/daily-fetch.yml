name: 每日台股資料更新

on:
  schedule:
    # 台北時間 18:00 → GitHub Actions 實測最早可靠窗口；n8n Phase1 完成後也會 workflow_dispatch 提前觸發
    - cron: '0 10 * * 1-5'
    # 台北時間 18:30
    - cron: '30 10 * * 1-5'
    # 台北時間 19:00
    - cron: '0 11 * * 1-5'
    # 台北時間 20:00 → 補跑 STOCK_DAY_ALL 極晚更新
    - cron: '0 12 * * 1-5'
    # 台北時間 21:00
    - cron: '0 13 * * 1-5'
    # 台北時間 22:00
    - cron: '0 14 * * 1-5'
    # 台北時間 23:30 → 補捉 STOCK_DAY_ALL 深夜更新（過午夜 Guard 2 就封死了）
    - cron: '30 15 * * 1-5'
  workflow_dispatch: # n8n Phase1 完成後觸發，或手動補跑

# 固定 group 名稱讓所有 run 排同一隊：後到的排隊等前面跑完（不取消），
# 避免兩個 run 同時「下載快照→改→上傳」互相覆蓋（lost update）
concurrency:
  group: daily-fetch
  cancel-in-progress: false

jobs:
  fetch-and-upload:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: package-lock.json

      # 輕量 Guard 前置（零依賴、讀 ~1KB meta.json）：
      # 被攔截的 run 在這裡結束（~30 秒），不裝依賴、不下載 10MB 快照
      - name: Guard 前置檢查
        id: guard
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
        run: node scripts/guard-check.mjs

      - name: Install dependencies
        if: steps.guard.outputs.SHOULD_RUN == 'true'
        run: npm ci

      - name: Install firebase-admin
        if: steps.guard.outputs.SHOULD_RUN == 'true'
        run: npm install firebase-admin --no-save

      - name: 抓取每日行情（含兩道 Guard：已完成 / 非交易日）
        if: steps.guard.outputs.SHOULD_RUN == 'true'
        id: fetch
        env:
          FINMIND_TOKEN: ${{ secrets.FINMIND_TOKEN }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
        run: |
          node scripts/fetch-daily.mjs
          # 確認 latest.json stocks 非空 → 代表本次 run 實際跑了完整 pipeline
          if node -e "
            const d = JSON.parse(require('fs').readFileSync('data/latest.json','utf-8'));
            process.exit(d.stocks && d.stocks.length > 0 ? 0 : 99);
          " 2>/dev/null; then
            echo "PIPELINE_RAN=true" >> $GITHUB_OUTPUT
            echo "✅ Pipeline 執行完成"
          else
            echo "PIPELINE_RAN=false" >> $GITHUB_OUTPUT
            echo "⏭️ 本次 run 被 Guard 攔截，跳過（正常行為）"
          fi

      - name: 計算市場訊號
        if: steps.fetch.outputs.PIPELINE_RAN == 'true'
        run: node scripts/calc-signals.mjs 100

      - name: 上傳 Supabase + Firestore
        if: steps.fetch.outputs.PIPELINE_RAN == 'true'
        env:
          FIREBASE_SERVICE_ACCOUNT_JSON: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_JSON }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: node scripts/write-firebase.mjs
