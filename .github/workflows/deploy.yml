name: Deploy to Vercel Production

on:
  push:
    branches: [main]
    paths-ignore:
      - 'scripts/**'
      - 'plans/**'
      - '*.md'

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Deploy to Vercel Production
        id: deploy
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
        run: |
          npm i -g vercel@54.19.0  # 54.20.x 改變 token 驗證方式，已知 breaking
          set +e
          DEPLOY_OUTPUT=$(vercel deploy --prod --yes 2>&1)  # 改用 VERCEL_TOKEN env var，不傳 --token 參數
          DEPLOY_EXIT=$?
          set -e
          echo "$DEPLOY_OUTPUT"
          if [ $DEPLOY_EXIT -ne 0 ]; then
            echo "❌ vercel deploy 失敗（exit $DEPLOY_EXIT）"
            exit $DEPLOY_EXIT
          fi
          DEPLOY_URL=$(echo "$DEPLOY_OUTPUT" | grep -o 'https://[^ ]*\.vercel\.app' | tail -1)
          echo "deploy_url=$DEPLOY_URL" >> "$GITHUB_OUTPUT"
          echo "Deployed: $DEPLOY_URL"

      - name: Alias to franky-stock-dashboard.vercel.app
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: |
          DEPLOY_URL="${{ steps.deploy.outputs.deploy_url }}"
          if [ -z "$DEPLOY_URL" ]; then
            echo "⚠️ 找不到部署 URL，跳過 alias（deploy 本身已成功）"
            exit 0
          fi
          vercel alias set "$DEPLOY_URL" franky-stock-dashboard.vercel.app
          echo "✅ https://franky-stock-dashboard.vercel.app → $DEPLOY_URL"

